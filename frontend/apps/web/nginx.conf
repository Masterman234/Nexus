# Nginx config for the Nexus SPA.
#
# Mirrors the Vite dev proxy (frontend/apps/web/vite.config.ts): the React app
# uses same-origin relative URLs (/api/v1, /chatHub), so nginx must route those
# to the API container while serving the static SPA for everything else.
#
# "nexus-api" is the API service name on the compose network; it listens on 8080
# (ASPNETCORE_URLS=http://+:8080 is set in docker-compose.prod.yml).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nexus_api {
    server nexus-api:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # REST API -> backend.
    location /api/ {
        proxy_pass http://nexus_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub -> backend, with WebSocket upgrade.
    location /chatHub {
        proxy_pass http://nexus_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived connections: don't time out idle websockets/long-polling.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional: expose the API health check at the edge for uptime probes.
    location = /health {
        proxy_pass http://nexus_api/health;
        proxy_set_header Host $host;
    }

    # SPA fallback: every other path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
