name: CD

# Build + push the API and web images to GHCR, then deploy them to the single
# Docker host (Oracle Cloud Always Free VM). See docs/deploy-oracle.md.
#
# Runs on every push to main (after CI has had a chance to run) and on manual
# dispatch. Images are tagged with both `latest` and the commit SHA so a deploy
# is reproducible / rollback-able.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST   public IP / hostname of the VM
#   SSH_USER   login user on the VM (e.g. ubuntu)
#   SSH_KEY    private SSH key (PEM) authorized on the VM
# GHCR auth uses the built-in GITHUB_TOKEN (no extra secret needed).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # GHCR image names must be lowercase; github.repository_owner may contain caps.
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/nexus-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/nexus-web

jobs:
  build-and-push:
    name: Build + push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.refs.outputs.api }}
      web_image: ${{ steps.refs.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image refs
        id: refs
        run: |
          echo "api=${IMAGE_API@L}" >> "$GITHUB_OUTPUT"
          echo "web=${IMAGE_WEB@L}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API image ---
      # Build context is the repo root (Dockerfile COPYs backend/src/* + Directory.*.props).
      - name: Build + push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/src/Nexus.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.refs.outputs.api }}:latest
            ${{ steps.refs.outputs.api }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Web image ---
      # Build context is ./frontend (the pnpm workspace root, per the Dockerfile header).
      - name: Build + push web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.refs.outputs.web }}:latest
            ${{ steps.refs.outputs.web }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ship the compose file to the host so the VM doesn't need a git checkout.
      # The host's pre-existing .env (secrets) lives in ~/nexus and is untouched.
      - name: Copy compose file to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.prod.yml,Caddyfile
          target: nexus

      - name: Pull + restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # GITHUB_TOKEN can't pull private GHCR images from the VM; if the
          # packages are private, log in on the host once with a PAT instead.
          script: |
            set -euo pipefail
            cd ~/nexus
            export API_IMAGE='${{ needs.build-and-push.outputs.api_image }}:${{ github.sha }}'
            export WEB_IMAGE='${{ needs.build-and-push.outputs.web_image }}:${{ github.sha }}'
            echo "Deploying API=$API_IMAGE WEB=$WEB_IMAGE"
            docker compose -f docker-compose.prod.yml pull nexus-api nexus-web
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
